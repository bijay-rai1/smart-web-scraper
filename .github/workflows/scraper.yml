name: scrape

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright pandas
          playwright install

      - name: Run script
        run: python main.py

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: scraped-data
          path: output.csv
